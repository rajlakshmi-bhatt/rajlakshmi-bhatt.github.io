<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awards</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    padding:0;
    background:#000;
    color:#fff;
}

/* Heading */
.gallery-heading{
    text-align:center;
    font-size:36px;
    color:#8ec6e1;
    margin:25px 0;
}

/* Gallery */
.gallery{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:20px;
    max-width:1200px;
    margin:auto;
    background:linear-gradient(145deg,#1a1a1a,#333);
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
}

/* Thumbnails */
.thumbnail{
    width:4cm;
    height:4cm;
    object-fit:cover;
    cursor:pointer;
    border-radius:10px;
    border:3px solid transparent;
    box-shadow:0 4px 6px rgba(0,0,0,.3);
    transition:.3s ease;
}

.thumbnail:hover{
    transform:scale(1.05);
    border:3px solid #8ec6e1;
    box-shadow:0 0 30px #8ec6e1,0 0 60px #8ec6e1,0 0 90px #8ec6e1;
}

/* Popup Panel */
.enlarged-image-panel{
    display:none;
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

/* Center container */
.enlarged-image-container{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:100%;
}

/* Wrapper makes close button align to image corner */
.image-wrapper{
    position:relative;
    display:inline-block;
}

/* Large image */
.enlarged-image{
    max-width:90vw;
    max-height:90vh;
    object-fit:contain;
    border:5px solid #8ec6e1;
    border-radius:15px;
    box-shadow:0 0 30px #8ec6e1,0 0 60px #8ec6e1,0 0 90px #8ec6e1;
}

/* Close button EXACT image top-right */
.close-btn{
    position:absolute;
    top:-15px;
    right:-15px;
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.85);
    color:#fff;
    font-size:28px;
    cursor:pointer;
    border:2px solid #8ec6e1;
    box-shadow:0 0 20px #8ec6e1;
    z-index:10000;
    transition:.3s ease;
}

.close-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #8ec6e1;
}
</style>
</head>

<body>

<h1 class="gallery-heading">Awards</h1>

<div class="gallery">

<div><img class="thumbnail" src="awards/award_1.png" data-large="awards/award_1.png"></div>
<div><img class="thumbnail" src="awards/award_2.png" data-large="awards/award_2.png"></div>
<div><img class="thumbnail" src="awards/award_3.png" data-large="awards/award_3.png"></div>
<div><img class="thumbnail" src="awards/award_4.png" data-large="awards/award_4.png"></div>
<div><img class="thumbnail" src="awards/award_5.png" data-large="awards/award_5.png"></div>
<div><img class="thumbnail" src="awards/award_6.png" data-large="awards/award_6.png"></div>
<div><img class="thumbnail" src="awards/award_7.png" data-large="awards/award_7.png"></div>
<div><img class="thumbnail" src="awards/award_8.png" data-large="awards/award_8.png"></div>
<div><img class="thumbnail" src="awards/award_9.png" data-large="awards/award_9.png"></div>
<div><img class="thumbnail" src="awards/award_10.png" data-large="awards/award_10.png"></div>
<div><img class="thumbnail" src="awards/award_11.png" data-large="awards/award_11.png"></div>
<div><img class="thumbnail" src="awards/award_12.png" data-large="awards/award_12.png"></div>
<div><img class="thumbnail" src="awards/award_13.png" data-large="awards/award_13.png"></div>
<div><img class="thumbnail" src="awards/award_14.png" data-large="awards/award_14.png"></div>
<div><img class="thumbnail" src="awards/award_15.png" data-large="awards/award_15.png"></div>
<div><img class="thumbnail" src="awards/award_16.png" data-large="awards/award_16.png"></div>
<div><img class="thumbnail" src="awards/award_17.png" data-large="awards/award_17.png"></div>
<div><img class="thumbnail" src="awards/award_18.png" data-large="awards/award_18.png"></div>
<div><img class="thumbnail" src="awards/award_19.png" data-large="awards/award_19.png"></div>

</div>

<!-- Popup -->
<div class="enlarged-image-panel" id="image-panel">

    <div class="enlarged-image-container">

        <div class="image-wrapper">
            <img id="enlarged-image" class="enlarged-image" src="">
            <button class="close-btn" id="close-btn">×</button>
        </div>

    </div>

</div>

<script>
$(document).ready(function(){

    $("#image-panel").hide();

    $(".thumbnail").click(function(){
        let img = $(this).attr("data-large");
        $("#enlarged-image").attr("src", img);
        $("#image-panel").css("display","flex").hide().fadeIn(300);
    });

    $("#close-btn").click(function(){
        $("#image-panel").fadeOut(300);
    });

    $("#image-panel").click(function(e){
        if(e.target.id === "image-panel"){
            $("#image-panel").fadeOut(300);
        }
    });

});
</script>

</body>
</html>
